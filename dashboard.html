<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Dashboard - Live widgets and real-time data" />
  <meta name="theme-color" content="#3b82f6" />
  <title>OmniWeb — Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <a href="index.html" class="site-brand" title="OmniWeb Home">OmniWeb</a>
      <button class="mobile-menu-btn" aria-label="Toggle navigation menu" aria-expanded="false">☰</button>
      <nav class="site-nav" role="navigation" aria-label="Main navigation">
        <a href="index.html" data-page="home">Home</a>
        <a href="about.html" data-page="about">About</a>
        <a href="projects.html" data-page="projects">Projects</a>
        <a href="dashboard.html" class="nav-active" data-page="dashboard">Dashboard</a>
        <a href="contact.html" data-page="contact">Contact</a>
        <button class="toggle-dark" aria-label="Toggle dark mode" title="Toggle dark/light mode">🌙</button>
      </nav>
    </div>
  </header>

  <main class="dashboard">
    <div class="container">
      <h1 class="dashboard-title">Dashboard</h1>

      <section class="dashboard-grid">
        <!-- Time Card -->
        <article class="dashboard-card" id="time-card" aria-live="polite">
          <h2>🕒 Current Time</h2>
          <div id="clock-time" class="clock-time">--:--:--</div>
          <div id="clock-date" class="clock-date">Loading date...</div>
        </article>

        <!-- Weather Card -->
        <article class="dashboard-card" id="weather-card" aria-live="polite">
          <h2>🌤️ Weather</h2>
          <div id="weather-status" class="muted">Detecting location…</div>
          <div id="weather-main" class="weather-main" hidden>
            <div class="weather-temp" id="weather-temp">--°</div>
            <div class="weather-desc" id="weather-desc">—</div>
            <div class="weather-meta" id="weather-meta">—</div>
          </div>
          <div id="weather-error" class="error" hidden></div>
        </article>

        <!-- GitHub Activity Card -->
        <article class="dashboard-card" id="github-card" aria-live="polite">
          <h2>🐙 GitHub Activity</h2>
          <div class="github-config">
            <label for="gh-user">GitHub username</label>
            <input id="gh-user" type="text" placeholder="octocat" value="StaticTrace" />
            <button id="gh-load">Load</button>
          </div>
          <ul id="gh-events" class="gh-events">
            <li class="muted">No activity loaded.</li>
          </ul>
        </article>
      </section>
    </div>
  </main>

  <footer class="site-footer" role="contentinfo">
    <div class="footer-container">
      <small>&copy; <span id="year">2026</span> OmniWeb. All rights reserved.</small>
      <nav class="footer-nav" aria-label="Footer links">
        <a href="https://github.com/StaticTrace/OmniWeb" rel="external" target="_blank">GitHub</a>
        <a href="#" class="scroll-to-top" aria-label="Back to top">↑ Top</a>
      </nav>
    </div>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/main.js"></script>
  <script src="js/components/time.js"></script>
  <script src="js/components/weather.js"></script>
  <script src="js/components/github.js"></script>
</body>
</html>
