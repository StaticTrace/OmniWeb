<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Client-side tools — OmniWeb. Text counter, password generator, calculator, JSON formatter, name generator.">
  <meta property="og:title" content="OmniWeb — Tools">
  <meta property="og:description" content="Mini toolkit: text counter, password generator, calculator, JSON formatter, and random name generator. All run in your browser.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <title>OmniWeb — Tools</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <a href="index.html" class="site-brand">OmniWeb</a>
      <button class="mobile-menu-btn" aria-label="Toggle menu">☰</button>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="tools.html" class="active">Tools</a>
        <a href="vault.html">Vault</a>
        <a href="contact.html">Contact</a>
        <button class="toggle-dark" aria-label="Toggle theme">🌙</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>🛠 Tools</h1>
    <p style="color:var(--muted); margin-bottom:1.5rem;">All tools run locally in your browser — no data leaves your device.</p>

    <div class="tools-grid">

      <!-- Text Counter -->
      <div class="widget">
        <h2>Text Counter</h2>
        <textarea id="text-input" rows="5" placeholder="Type or paste text here…"></textarea>
        <div id="text-stats" class="output"></div>
      </div>

      <!-- Password Generator -->
      <div class="widget">
        <h2>Secure Password Generator</h2>
        <div style="display:flex; gap:10px; margin-bottom:12px;">
          <input type="text" id="password-output" readonly style="flex:1; font-family:monospace;">
          <button onclick="generatePassword()">Generate</button>
          <button onclick="copyPassword()" style="background:var(--surface2); color:var(--text); border:1px solid rgba(255,255,255,0.1);">Copy</button>
        </div>
        <div style="display:flex; gap:1.2rem; font-size:0.88rem;">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
            <input type="checkbox" id="include-numbers" checked> Numbers
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
            <input type="checkbox" id="include-symbols" checked> Symbols
          </label>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
            Length:
            <input type="number" id="pw-length" value="16" min="8" max="64" style="width:58px;">
          </label>
        </div>
      </div>

      <!-- Random Name Generator -->
      <div class="widget">
        <h2>Random Name Generator</h2>
        <div class="namegen-result" id="namegen-result">Hit Generate ↓</div>
        <div class="namegen-type" style="margin-bottom:12px;">
          <label><input type="radio" name="namegen-mode" value="username" checked> Username</label>
          <label><input type="radio" name="namegen-mode" value="fullname"> Full Name</label>
          <label><input type="radio" name="namegen-mode" value="codename"> Code Name</label>
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="generateName()">Generate</button>
          <button onclick="copyName()" style="background:var(--surface2); color:var(--text); border:1px solid rgba(255,255,255,0.1);">Copy</button>
        </div>
        <div id="namegen-history" style="margin-top:12px;"></div>
      </div>

      <!-- Calculator -->
      <div class="widget">
        <h2>Calculator</h2>
        <input type="text" id="calc-display" class="calc-display" readonly>
        <div class="calc-grid"></div>
      </div>

      <!-- JSON Formatter -->
      <div class="widget">
        <h2>JSON Formatter</h2>
        <textarea id="json-input" rows="6" placeholder='{"key": "value"}'></textarea>
        <div style="margin-top:10px; display:flex; gap:8px;">
          <button onclick="formatJSON()">Format</button>
          <button onclick="minifyJSON()" style="background:var(--surface2); color:var(--text); border:1px solid rgba(255,255,255,0.1);">Minify</button>
          <button onclick="copyJSON()" style="background:var(--surface2); color:var(--text); border:1px solid rgba(255,255,255,0.1);">Copy</button>
        </div>
        <pre id="json-output" class="output"></pre>
      </div>

    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-container">
      <small>&copy; <span id="year"></span> OmniWeb</small>
    </div>
  </footer>

  <script src="script.js"></script>
  <script src="tools.js"></script>
</body>
</html>
