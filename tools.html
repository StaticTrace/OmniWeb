<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Client-side tools and utilities">
  <title>OmniWeb — Tools</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <a href="index.html" class="site-brand">OmniWeb</a>
      <button class="mobile-menu-btn" aria-label="Toggle menu">☰</button>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="tools.html" class="active">Tools</a>
        <a href="vault.html">Vault</a>
        <a href="contact.html">Contact</a>
        <button class="toggle-dark" aria-label="Toggle theme">🌙</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>🛠 Tools</h1>
    <p>All tools run locally in your browser.</p>
    
    <div class="tools-grid">
      <!-- Text Counter -->
      <div class="widget">
        <h2>Text Counter</h2>
        <textarea id="text-input" rows="5" placeholder="Type or paste text here..."></textarea>
        <div id="text-stats" class="output"></div>
      </div>

      <!-- Password Generator -->
      <div class="widget">
        <h2>Secure Password Generator</h2>
        <div style="display:flex; gap:10px; margin-bottom:12px;">
          <input type="text" id="password-output" readonly style="flex:1;">
          <button onclick="generatePassword()">Generate</button>
          <button onclick="copyPassword()">Copy</button>
        </div>
        <div style="font-size:0.9rem;">
          <label><input type="checkbox" id="include-numbers" checked> Numbers</label>
          <label><input type="checkbox" id="include-symbols" checked> Symbols</label>
        </div>
      </div>

      <!-- Calculator -->
      <div class="widget">
        <h2>Calculator</h2>
        <input type="text" id="calc-display" class="calc-display" readonly>
        <div class="calc-grid"></div>
      </div>

      <!-- JSON Formatter -->
      <div class="widget">
        <h2>JSON Formatter</h2>
        <textarea id="json-input" rows="6" placeholder='{"key": "value"}'></textarea>
        <div style="margin-top:12px;">
          <button onclick="formatJSON()">Format</button>
          <button onclick="copyJSON()">Copy</button>
        </div>
        <pre id="json-output" class="output"></pre>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-container">
      <small>&copy; <span id="year"></span> OmniWeb</small>
    </div>
  </footer>

  <script src="script.js"></script>
  <script src="tools.js"></script>
</body>
</html>
