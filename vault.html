<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal secure vault — OmniWeb. Private notes stored in your browser's localStorage.">
  <meta property="og:title" content="OmniWeb — Vault">
  <meta property="og:description" content="Private notes stored securely in your browser. No server, no cloud — just you.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="OmniWeb — Vault">
  <meta name="twitter:description" content="Private notes stored securely in your browser.">
  <title>OmniWeb — Vault</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <a href="index.html" class="site-brand">OmniWeb</a>
      <button class="mobile-menu-btn" aria-label="Toggle menu">☰</button>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="tools.html">Tools</a>
        <a href="vault.html" class="active">Vault</a>
        <a href="contact.html">Contact</a>
        <button class="toggle-dark" aria-label="Toggle theme">🌙</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>🔐 Vault</h1>
    <p>Private notes stored securely in your browser (localStorage).</p>
    
    <div class="widget">
      <textarea id="vault-input" rows="10" placeholder="Write your private note here..."></textarea>
      <div style="margin-top: 16px;">
        <button onclick="saveVault()">Save Note</button>
        <button onclick="loadVault()">Load Notes</button>
        <button onclick="clearVault()" style="background: var(--danger);">Clear All</button>
      </div>
      <div id="vault-list" style="margin-top: 20px;"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-container">
      <small>&copy; <span id="year"></span> OmniWeb • Built with Vanilla Everything</small>
    </div>
  </footer>

  <script type="module" src="js/pages/vault.js"></script>
</body>
</html>
