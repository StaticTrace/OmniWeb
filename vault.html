<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal secure vault">
  <title>OmniWeb — Vault</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <a href="index.html" class="site-brand">OmniWeb</a>
      <button class="mobile-menu-btn" aria-label="Toggle menu">☰</button>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="tools.html">Tools</a>
        <a href="vault.html" class="active">Vault</a>
        <a href="contact.html">Contact</a>
        <button class="toggle-dark" aria-label="Toggle theme">🌙</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>🔐 Vault</h1>
    <p>Private notes stored securely in your browser (localStorage).</p>
    
    <div class="widget">
      <textarea id="vault-input" rows="10" placeholder="Write your private note here..."></textarea>
      <div style="margin-top: 16px;">
        <button onclick="saveVault()">Save Note</button>
        <button onclick="loadVault()">Load Notes</button>
        <button onclick="clearVault()" style="background: var(--danger);">Clear All</button>
      </div>
      <div id="vault-list" style="margin-top: 20px;"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-container">
      <small>&copy; <span id="year"></span> OmniWeb • Built with Vanilla Everything</small>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    function saveVault() {
      const text = document.getElementById('vault-input').value.trim();
      if (!text) return alert("Note is empty!");
      
      let notes = JSON.parse(localStorage.getItem('omniVault') || '[]');
      notes.unshift({ text, date: new Date().toLocaleString() });
      localStorage.setItem('omniVault', JSON.stringify(notes));
      alert("Note saved!");
      loadVault();
    }

    function loadVault() {
      const list = document.getElementById('vault-list');
      const notes = JSON.parse(localStorage.getItem('omniVault') || '[]');
      
      if (notes.length === 0) {
        list.innerHTML = '<p style="color:var(--muted);">No notes yet.</p>';
        return;
      }
      
      list.innerHTML = notes.map(n => `
        <div style="background:rgba(255,255,255,0.05); padding:14px; border-radius:8px; margin-bottom:12px;">
          <small style="color:var(--muted);">${n.date}</small>
          <p style="margin-top:8px;">${n.text.replace(/\n/g, '<br>')}</p>
        </div>
      `).join('');
    }

    function clearVault() {
      if (confirm("Clear all notes permanently?")) {
        localStorage.removeItem('omniVault');
        loadVault();
      }
    }

    // Auto load notes when page opens
    window.addEventListener('load', loadVault);
  </script>
</body>
</html>
