<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Personal secure vault — OmniWeb. Private notes stored in your browser's localStorage.">
  <meta property="og:title" content="OmniWeb — Vault">
  <meta property="og:description" content="Private notes stored securely in your browser. No server, no cloud — just you.">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="OmniWeb — Vault">
  <meta name="twitter:description" content="Private notes stored securely in your browser.">
  <title>OmniWeb — Vault</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-container">
      <a href="index.html" class="site-brand">OmniWeb</a>
      <button class="mobile-menu-btn" aria-label="Toggle menu">☰</button>
      <nav class="site-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="projects.html">Projects</a>
        <a href="dashboard.html">Dashboard</a>
        <a href="tools.html">Tools</a>
        <a href="vault.html" class="active">Vault</a>
        <a href="contact.html">Contact</a>
        <button class="toggle-dark" aria-label="Toggle theme">🌙</button>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1>🔐 Vault</h1>
    <p>Private notes stored securely in your browser (localStorage).</p>
    
    <div class="widget">
      <textarea id="vault-input" rows="10" placeholder="Write your private note here..."></textarea>
      <div style="margin-top: 16px;">
        <button onclick="saveVault()">Save Note</button>
        <button onclick="loadVault()">Load Notes</button>
        <button onclick="clearVault()" style="background: var(--danger);">Clear All</button>
      </div>
      <div id="vault-list" style="margin-top: 20px;"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-container">
      <small>&copy; <span id="year"></span> OmniWeb • Built with Vanilla Everything</small>
    </div>
  </footer>

  <script src="script.js"></script>
  <script>
    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    function vaultToast(msg, isError) {
      let t = document.getElementById('vault-toast');
      if (!t) {
        t = document.createElement('div');
        t.id = 'vault-toast';
        t.style.cssText = 'position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;font-size:0.88rem;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.2s ease;font-family:Inter,system-ui,sans-serif;color:white;';
        document.body.appendChild(t);
      }
      t.textContent = msg;
      t.style.background = isError ? '#ef4444' : '#22c55e';
      t.style.opacity = '1';
      clearTimeout(t._timer);
      t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2200);
    }

    function saveVault() {
      const text = document.getElementById('vault-input').value.trim();
      if (!text) { vaultToast('Note is empty!', true); return; }
      let notes = JSON.parse(localStorage.getItem('omniVault') || '[]');
      notes.unshift({ text, date: new Date().toLocaleString() });
      localStorage.setItem('omniVault', JSON.stringify(notes));
      document.getElementById('vault-input').value = '';
      vaultToast('Note saved!');
      loadVault();
    }

    function loadVault() {
      const list = document.getElementById('vault-list');
      const notes = JSON.parse(localStorage.getItem('omniVault') || '[]');
      if (notes.length === 0) {
        list.innerHTML = '<p style="color:var(--muted);">No notes yet.</p>';
        return;
      }
      list.innerHTML = notes.map((n, i) => `
        <div style="background:var(--surface2);padding:14px;border-radius:8px;margin-bottom:12px;position:relative;">
          <small style="color:var(--muted);">${escapeHtml(n.date)}</small>
          <p style="margin-top:8px;white-space:pre-wrap;word-break:break-word;">${escapeHtml(n.text)}</p>
          <button onclick="deleteVaultNote(${i})" title="Delete note" style="position:absolute;top:10px;right:10px;background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:2px 6px;line-height:1;">×</button>
        </div>
      `).join('');
    }

    function deleteVaultNote(i) {
      let notes = JSON.parse(localStorage.getItem('omniVault') || '[]');
      notes.splice(i, 1);
      localStorage.setItem('omniVault', JSON.stringify(notes));
      vaultToast('Note deleted.');
      loadVault();
    }

    function clearVault() {
      if (confirm('Clear all notes permanently?')) {
        localStorage.removeItem('omniVault');
        vaultToast('All notes cleared.');
        loadVault();
      }
    }

    document.addEventListener('DOMContentLoaded', loadVault);
  </script>
</body>
</html>
